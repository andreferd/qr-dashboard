name: Check for New Auctions

on:
  schedule:
    # Run daily at 18:00 UTC (2 hours after auctions settle at 16:00 UTC)
    - cron: '0 18 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  check-auctions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for new auctions via Base RPC
        id: check
        run: |
          # Get current auction ID from contract
          RESULT=$(curl -s -X POST https://1rpc.io/base \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"eth_call","params":[{"to":"0x7309779122069efa06ef71a45ae0db55a259a176","data":"0x7d9f6db5"},"latest"],"id":1}')

          # Parse auction ID (first 32 bytes = auction ID in hex)
          HEX_ID=$(echo $RESULT | python3 -c "import json,sys; r=json.load(sys.stdin); print(int(r['result'][2:66], 16))" 2>/dev/null || echo "0")
          echo "Current auction ID from blockchain: $HEX_ID"

          # Get latest settled auction (current - 1)
          LATEST_SETTLED=$((HEX_ID - 1))
          echo "Latest settled: #$LATEST_SETTLED"

          # Get our latest auction ID from the data file
          OUR_LATEST=$(python3 -c "
          import json
          data = json.load(open('data/auctions.json'))
          print(max(a['id'] for a in data))
          ")
          echo "Our latest: #$OUR_LATEST"

          # Check if we're behind
          if [ "$LATEST_SETTLED" -gt "$OUR_LATEST" ]; then
            MISSING=$((LATEST_SETTLED - OUR_LATEST))
            echo "⚠️  BEHIND by $MISSING auction(s)!"
            echo "Missing: #$((OUR_LATEST + 1)) to #$LATEST_SETTLED"
            echo "is_behind=true" >> $GITHUB_OUTPUT
            echo "missing=$MISSING" >> $GITHUB_OUTPUT
            echo "our_latest=$OUR_LATEST" >> $GITHUB_OUTPUT
            echo "latest_settled=$LATEST_SETTLED" >> $GITHUB_OUTPUT
          else
            echo "✅ Up to date! Our latest: #$OUR_LATEST"
            echo "is_behind=false" >> $GITHUB_OUTPUT
          fi

      - name: Report status
        run: |
          if [ "${{ steps.check.outputs.is_behind }}" == "true" ]; then
            echo "🔴 Dashboard is behind!"
            echo "Missing ${{ steps.check.outputs.missing }} auction(s)"
            echo "Need to add: #${{ steps.check.outputs.our_latest }} → #${{ steps.check.outputs.latest_settled }}"
            echo ""
            echo "To update: open qrcoin.fun/winners and ask Claude to add missing auctions"
          else
            echo "🟢 Dashboard is up to date!"
          fi
